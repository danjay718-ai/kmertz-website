<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Icon Section -->
  <g transform="translate(50, 10)">
    <!-- Window Frame -->
    <ellipse cx="50" cy="50" rx="40" ry="55" fill="#002B49" />
    <ellipse cx="50" cy="50" rx="34" ry="49" fill="#B0C4DE" />
    
    <!-- Clipping for window content -->
    <defs>
      <clipPath id="windowClip">
        <ellipse cx="50" cy="50" rx="32" ry="47" />
      </clipPath>
      <linearGradient id="skyGradient" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="#FFBD00" />
        <stop offset="100%" stop-color="#FF8A00" />
      </linearGradient>
    </defs>
    
    <g clip-path="url(#windowClip)">
      <!-- Sky -->
      <rect x="18" y="3" width="64" height="94" fill="url(#skyGradient)" />
      
      <!-- Clouds -->
      <circle cx="35" cy="25" r="8" fill="white" fill-opacity="0.4" />
      <circle cx="45" cy="22" r="10" fill="white" fill-opacity="0.5" />
      <circle cx="55" cy="28" r="7" fill="white" fill-opacity="0.3" />
      
      <!-- Mountains -->
      <path d="M 18,97 L 30,75 L 45,85 L 60,65 L 82,97 Z" fill="#2D5B7B" />
      <path d="M 18,97 L 35,80 L 50,90 L 65,75 L 82,97 Z" fill="#1A3B52" fill-opacity="0.6" />
    </g>
    
    <!-- Airplane Trail -->
    <path d="M 25,85 Q 40,70 55,55" stroke="#00A3E0" stroke-width="4" stroke-linecap="round" fill="none" />
    <path d="M 22,88 Q 38,72 52,58" stroke="#FBB03B" stroke-width="3" stroke-linecap="round" fill="none" />
    
    <!-- Airplane -->
    <path d="M 50,55 L 75,35 L 72,32 L 68,34 L 62,28 L 65,25 L 68,22 L 65,19 L 60,24 L 54,20 L 56,15 L 53,13 L 50,15 L 48,18 L 50,22 L 45,30 L 38,32 L 35,35 L 48,34 Z" fill="#002B49" transform="rotate(-10, 50, 55)" />
  </g>
  
  <!-- Text Section -->
  <text x="100" y="150" font-family="Arial, sans-serif" font-weight="900" font-size="28" fill="#FFFFFF" text-anchor="middle" style="letter-spacing: 1px;">K-MERTZ</text>
  <text x="100" y="170" font-family="Arial, sans-serif" font-weight="600" font-size="10" fill="#FFBD00" text-anchor="middle" style="letter-spacing: 3px;">TRAVEL AND TOURS</text>
</svg>
